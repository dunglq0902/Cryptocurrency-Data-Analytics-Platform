# ─────────────────────────────────────────────
# Cryptocurrency Analytics Platform
# Local development stack
# ─────────────────────────────────────────────

x-spark-common: &spark-common
  image: crypto-analytics/spark:latest
  build:
    context: .
    dockerfile: docker/Dockerfile.spark
  environment:
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    S3_ENDPOINT: http://minio:9000
    AWS_ACCESS_KEY_ID: admin
    AWS_SECRET_ACCESS_KEY: password
    AWS_REGION: us-east-1
    MONGO_URI: mongodb://mongodb:27017
    SPARK_MASTER: spark://spark-master:7077
    SPARK_WORKER_DIR: /tmp/spark-work
    SPARK_LOCAL_DIRS: /tmp/spark-local
  volumes:
    - ./spark:/opt/spark/work-dir/spark          # Mount only Spark source
  depends_on:
    kafka:
      condition: service_healthy
    minio:
      condition: service_started
  networks:
    - crypto-net

services:

  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: crypto-zookeeper
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok"
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"
    networks:
      - crypto-net

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: crypto-kafka-1
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID:                    1
      KAFKA_ZOOKEEPER_CONNECT:            zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:         PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS:                    PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME:   PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:    "true"
      KAFKA_LOG_RETENTION_HOURS:          168
      KAFKA_HEAP_OPTS:                    "-Xmx1G -Xms1G"
      KAFKA_JMX_PORT:                     9101
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout:  10s
      retries:  10
    networks:
      - crypto-net

  # ── Kafka UI ──────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: crypto-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:              local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS:  kafka:29092
    networks:
      - crypto-net

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    container_name: crypto-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["NONE"]
    networks:
      - crypto-net

  minio-init:
    image: minio/mc:RELEASE.2023-11-20T16-30-59Z
    container_name: crypto-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/crypto-lake || true;
      /usr/bin/mc mb myminio/checkpoints || true;
      exit 0;
      "
    networks:
      - crypto-net

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: crypto-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE:      crypto_analytics
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - crypto-net

  # ── Spark Master ──────────────────────────────────────────────────────────────
  spark-master:
    <<: *spark-common
    container_name: crypto-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"   # Spark master RPC
      - "4040:4040"   # Spark UI
      - "8082:8080"   # Master Web UI
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      MONGO_URI: mongodb://mongodb:27017
      SPARK_MASTER: spark://spark-master:7077
      SPARK_MASTER_HOST: spark-master
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout:  10s
      retries:  5

  # ── Spark Worker ──────────────────────────────────────────────────────────────
  spark-worker:
    <<: *spark-common
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      MONGO_URI: mongodb://mongodb:27017
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 3g
      SPARK_WORKER_CORES:  1
    deploy:
      replicas: 1

  # ── Airflow ───────────────────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: crypto-airflow-webserver
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8085:8080"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR:          LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN:  postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY:        ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES:     "false"
      AIRFLOW__WEBSERVER__SECRET_KEY:   "changeme"
      KAFKA_BOOTSTRAP_SERVERS:          kafka:29092
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./spark:/opt/airflow/spark
      - ./ingestion:/opt/airflow/ingestion
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout:  10s
      retries:  5

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: crypto-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./spark:/opt/airflow/spark
      - ./ingestion:/opt/airflow/ingestion
    networks:
      - crypto-net

  airflow-postgres:
    image: postgres:15
    container_name: crypto-airflow-postgres
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries:  5
    networks:
      - crypto-net

  airflow-init:
    # One-shot container to initialize Airflow DB, users and connections
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: crypto-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade || true
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
        airflow connections add 'spark_local' --conn-type 'spark' --conn-host 'spark://spark-master' --conn-port '7077' || true
        airflow connections add 'spark_k8s' --conn-type 'spark' --conn-host 'spark://spark-master' --conn-port '7077' || true
    environment: *airflow-env
    depends_on:
      airflow-postgres:
        condition: service_healthy
    networks:
      - crypto-net


  # ── Alert Engine API ──────────────────────────────────────────────────────────
  alert-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.alert-engine
    container_name: crypto-alert-api
    ports:
      - "8000:8000"
    environment:
      MONGO_URI:        mongodb://root:changeme@mongodb:27017
      MONGO_DB:         crypto_analytics
      NOTIFICATION_SVC: http://notification-service:8001
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - crypto-net

  notification-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.alert-engine
    container_name: crypto-notification-svc
    command: ["uvicorn", "alert_engine.notifier.notification_service:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    env_file:
      - .env
    networks:
      - crypto-net

  # ── Prometheus & Grafana ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: crypto-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - crypto-net

  grafana:
    image: grafana/grafana:10.3.0
    container_name: crypto-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - crypto-net

  # ── Initialization & Ingestion ────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: crypto-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
      echo 'Creating Kafka topics...' &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-crypto-ticks --partitions 5 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-ohlcv --partitions 5 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-orderbook --partitions 5 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic processed-signals --partitions 5 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic alert-events --partitions 5 --replication-factor 1 &&
      echo 'Kafka topics created.'
      "
    networks:
      - crypto-net

  mongo-seed:
    build:
      context: .
      dockerfile: docker/Dockerfile.alert-engine
    container_name: crypto-mongo-seed
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      bash -c "
      python scripts/seed_data.py --mongo-uri mongodb://root:changeme@mongodb:27017 --db crypto_analytics
      "
    networks:
      - crypto-net

  ingestion-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    container_name: crypto-ingestion-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - crypto-net

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  minio-data:
  mongodb-data:
  airflow-postgres-data:
  prometheus-data:
  grafana-data:

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  crypto-net:
    driver: bridge
