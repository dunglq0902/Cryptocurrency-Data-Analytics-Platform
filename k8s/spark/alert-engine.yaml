---
# k8s/app/alert-engine.yaml
# Alert Engine API + Notification Service deployments

# ── Alert Engine API ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-api
  namespace: app-system
  labels:
    app: alert-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alert-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: alert-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: alert-api
          image: crypto-analytics/alert-engine:latest
          command: ["uvicorn", "alert_engine.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: uri
            - name: MONGO_DB
              value: "crypto_analytics"
            - name: NOTIFICATION_SVC
              value: "http://notification-service.app-system.svc.cluster.local:8001"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: alert-api
  namespace: app-system
spec:
  selector:
    app: alert-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
# ── Notification Service ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: app-system
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: crypto-analytics/alert-engine:latest
          command: ["uvicorn", "alert_engine.notifier.notification_service:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: telegram-bot-token
            - name: SMTP_HOST
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: smtp-user
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: smtp-password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: app-system
spec:
  selector:
    app: notification-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
---
# ── Secrets (templates — fill in with real values or use Sealed Secrets) ───────
apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  namespace: app-system
type: Opaque
stringData:
  uri: "mongodb://mongodb-0.mongodb-headless.storage-system.svc.cluster.local:27017"
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-secrets
  namespace: app-system
type: Opaque
stringData:
  telegram-bot-token: "YOUR_TELEGRAM_BOT_TOKEN"
  smtp-user:          "YOUR_SMTP_EMAIL"
  smtp-password:      "YOUR_SMTP_PASSWORD"
---
# ── HPA for Alert API ──────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alert-api-hpa
  namespace: app-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alert-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
