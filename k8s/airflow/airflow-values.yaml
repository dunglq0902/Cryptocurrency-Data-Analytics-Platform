# k8s/airflow/airflow-values.yaml
# Helm values override for Apache Airflow deployment in Kubernetes.
# Apply with:
#   helm repo add apache-airflow https://airflow.apache.org
#   helm upgrade --install airflow apache-airflow/airflow \
#     --namespace airflow-system \
#     --values k8s/airflow/airflow-values.yaml

# ── Executor ────────────────────────────────────────────────────────────────────
executor: KubernetesExecutor

# ── Images ──────────────────────────────────────────────────────────────────────
images:
  airflow:
    repository: apache/airflow
    tag:        "2.8.0"
    pullPolicy: IfNotPresent

# ── Airflow config ───────────────────────────────────────────────────────────────
config:
  core:
    load_examples:              "False"
    default_timezone:           "UTC"
    parallelism:                "32"
    max_active_runs_per_dag:    "3"
    executor:                   "KubernetesExecutor"
  logging:
    logging_level:              "INFO"
    remote_logging:             "True"
    remote_base_log_folder:     "hdfs://namenode.storage-system.svc.cluster.local:8020/airflow/logs"
  kubernetes:
    namespace:                  "airflow-system"
    worker_container_repository: "crypto-analytics/airflow-worker"
    worker_container_tag:       "latest"
    delete_worker_pods:         "True"
    delete_worker_pods_on_failure: "False"

# ── Connections (pre-seeded) ─────────────────────────────────────────────────────
connections:
  - id:       spark_k8s
    type:     spark
    host:     "k8s://https://kubernetes.default.svc.cluster.local"
    extra:    '{"spark-home": "/opt/spark", "deploy-mode": "cluster", "namespace": "spark-system"}'
  - id:       hdfs_default
    type:     hdfs
    host:     namenode.storage-system.svc.cluster.local
    port:     8020
  - id:       mongo_default
    type:     mongo
    host:     mongodb-0.mongodb-headless.storage-system.svc.cluster.local
    port:     27017
    schema:   crypto_analytics

# ── DAGs ────────────────────────────────────────────────────────────────────────
dags:
  gitSync:
    enabled:      true
    repo:         "https://github.com/your-org/crypto-analytics-platform.git"
    branch:       main
    rev:          HEAD
    depth:        1
    maxFailures:  3
    subPath:      "airflow/dags"
    wait:         60
    containerName: git-sync
    uid:          65533

# ── Webserver ─────────────────────────────────────────────────────────────────
webserver:
  defaultUser:
    enabled:   true
    role:      Admin
    username:  admin
    email:     admin@crypto-analytics.io
    firstName: Admin
    lastName:  User
    password:  admin
  service:
    type: NodePort
    ports:
      - name:     airflow-ui
        port:     8080
        nodePort: 30080
  resources:
    requests:
      cpu:    "300m"
      memory: "512Mi"
    limits:
      cpu:    "500m"
      memory: "1Gi"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds:       20

# ── Scheduler ─────────────────────────────────────────────────────────────────
scheduler:
  replicas: 1
  resources:
    requests:
      cpu:    "500m"
      memory: "1Gi"
    limits:
      cpu:    "1000m"
      memory: "2Gi"

# ── Kubernetes Executor worker pod template ────────────────────────────────────
workers:
  resources:
    requests:
      cpu:    "500m"
      memory: "1Gi"
    limits:
      cpu:    "1000m"
      memory: "2Gi"

# ── PostgreSQL (metadata DB) ──────────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: airflow
    password: airflow
    database: airflow
  primary:
    persistence:
      enabled:      true
      size:         "10Gi"
    resources:
      requests:
        cpu:    "250m"
        memory: "256Mi"

# ── Redis (not needed for KubernetesExecutor, disabled) ───────────────────────
redis:
  enabled: false

# ── Flower (disabled for KubernetesExecutor) ──────────────────────────────────
flower:
  enabled: false

# ── Extra environment variables ───────────────────────────────────────────────
env:
  - name:  KAFKA_BOOTSTRAP_SERVERS
    value: "kafka-headless.kafka-system.svc.cluster.local:9092"
  - name:  HDFS_NAMENODE
    value: "hdfs://namenode.storage-system.svc.cluster.local:8020"
  - name:  MONGO_URI
    valueFrom:
      secretKeyRef:
        name: airflow-secrets
        key:  mongo-uri

# ── Extra secrets ─────────────────────────────────────────────────────────────
extraSecrets:
  airflow-secrets:
    data:
      mongo-uri: "bW9uZ29kYjovL3Jvb3Q6Y2hhbmdlbWVAbW9uZ29kYjo yNzAxNw=="  # base64
