# helm/infra/Chart.yaml
apiVersion: v2
name: crypto-infra
description: Infrastructure components for the Cryptocurrency Analytics Platform
  (Kafka, Zookeeper, Schema Registry, HDFS, MongoDB)
type: application
version: 1.0.0
appVersion: "1.0.0"
maintainers:
  - name: data-engineering
    email: data-engineering@crypto-analytics.io
keywords:
  - kafka
  - hdfs
  - mongodb
  - streaming
  - lakehouse
dependencies:
  - name:       kafka
    version:    "26.*"
    repository: https://charts.bitnami.com/bitnami
    condition:  kafka.enabled
  - name:       mongodb
    version:    "14.*"
    repository: https://charts.bitnami.com/bitnami
    condition:  mongodb.enabled
  - name:       zookeeper
    version:    "12.*"
    repository: https://charts.bitnami.com/bitnami
    condition:  zookeeper.enabled
