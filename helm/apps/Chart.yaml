# helm/apps/Chart.yaml
apiVersion: v2
name: crypto-apps
description: Application services for the Cryptocurrency Analytics Platform
  (Alert Engine API, Notification Service, Ingestion Producers, Airflow)
type: application
version: 1.0.0
appVersion: "1.0.0"
maintainers:
  - name: data-engineering
    email: data-engineering@crypto-analytics.io
keywords:
  - alert-engine
  - notification
  - airflow
  - ingestion
  - fastapi
dependencies:
  - name:       airflow
    version:    "1.11.*"
    repository: https://airflow.apache.org
    condition:  airflow.enabled
